<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tierra Fértil · Programación Ministerial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
button,input{font:inherit;color:inherit}
:root{
  --bg:#FAFAFA;--panel:#FFFFFF;--border:#E5E7EB;--border-strong:#D1D5DB;
  --text:#111827;--muted:#6B7280;--muted-2:#9CA3AF;
  --blue:#2563EB;--blue-hover:#1D4ED8;
  --yellow:#FACC15;--yellow-hover:#EAB308;
  --sat-green:#4ADE80;--sat-green-hover:#22C55E;
  --red:#EF4444;
  --shadow:0 24px 70px rgba(0,0,0,.14);
  font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
html,body{height:100%;overflow:hidden;}
html{-webkit-text-size-adjust:100%}
body{
  margin:0;
  background:radial-gradient(circle at 86% 8%,rgba(255,255,255,.9),rgba(255,255,255,0) 360px),linear-gradient(180deg,#F8FAFC 0%,#EEF2F7 100%);
  color:var(--text);font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  -webkit-font-smoothing:antialiased;
}

/* ─── HEADER ─── */
.app-header{background:var(--panel);border-bottom:1px solid var(--border);padding:0 20px;height:58px;display:flex;align-items:center;gap:12px;position:fixed;top:0;left:0;right:0;z-index:100;box-shadow:0 1px 2px rgba(0,0,0,.05);}
.logo-mark{width:34px;height:34px;flex-shrink:0;background:linear-gradient(135deg,#EF4444 0%,#111827 100%);border-radius:10px;display:flex;align-items:center;justify-content:center;}
.app-name{font-size:15px;font-weight:700;letter-spacing:-.01em}
.app-tagline{font-size:10px;color:var(--muted);font-weight:400;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px;}
.hdr-spacer{flex:1}
.hdr-filter-btn{display:none;align-items:center;gap:6px;padding:7px 12px;background:var(--bg);border:1px solid var(--border);border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;transition:all .18s ease;}
.hdr-filter-btn:hover{background:#F9FAFB;border-color:var(--border-strong)}
.hdr-filter-btn.has-filter{background:#EFF6FF;border-color:#BFDBFE;color:var(--blue)}

/* ─── LAYOUT ─── */
.layout{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 58px);overflow:hidden;margin-top:58px;}

/* ─── SIDEBAR ─── */
.sidebar{background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;padding:22px 16px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sec-label{margin:0 0 8px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#111827;}
.sidebar-sec{margin-bottom:20px}
.search-wrap{position:relative;margin-bottom:10px}
.search-wrap .s-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
.search-wrap input{width:100%;height:36px;border:1px solid var(--border);border-radius:10px;padding:0 12px 0 34px;background:var(--panel);color:var(--text);font-size:13px;outline:none;transition:border-color .18s ease;}
.search-wrap input:focus{border-color:var(--border-strong);box-shadow:0 0 0 3px rgba(17,24,39,.05)}
.search-wrap input::placeholder{color:var(--muted-2)}
.min-list{display:flex;flex-direction:column;gap:1px;overflow-y:auto;scrollbar-width:thin}
.min-item{display:flex;align-items:center;gap:9px;padding:6px 9px;border-radius:10px;cursor:pointer;transition:background .14s ease;font-size:13px;font-weight:500;}
.min-item:hover{background:#F3F4F6}
.min-item.active{background:#EFF6FF;border:1px solid #BFDBFE;font-weight:600}
.avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;}
.min-name{flex:1;line-height:1.2;color:#374151}
.min-item.active .min-name{color:var(--blue)}
.min-count{font-size:10px;font-weight:600;background:var(--bg);border-radius:999px;padding:1px 6px;color:var(--muted);}
.min-item.active .min-count{background:#DBEAFE;color:var(--blue)}
.bday-list-row{display:flex;align-items:baseline;gap:6px;padding:4px 0;border-bottom:1px solid #FEE2F0;}
.bday-list-row:last-child{border-bottom:none;}
.bday-list-date{font-size:10px;font-weight:700;color:#BE185D;white-space:nowrap;flex-shrink:0;}
.bday-list-name{font-size:12px;font-weight:600;color:#111827;line-height:1.3;}
/* Clear icon inside filter */
.filter-clear-icon{flex-shrink:0;width:34px;height:34px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:10px;background:var(--panel);color:var(--muted);cursor:pointer;transition:all .14s ease;font-family:inherit;}
.filter-clear-icon:hover{background:#FEE2E2;border-color:#FECACA;color:var(--red)}

/* ─── CALENDAR SECTION ─── */
.cal-section{overflow:hidden;padding:14px 22px 0;display:flex;flex-direction:column;height:calc(100vh - 58px);}
.cal-scroll-body{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0;max-height:100%;}
.cal-scroll-body.stats-active{overflow-y:auto;overflow-x:hidden;padding-bottom:32px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}

/* ─── TOPBAR ─── */
.cal-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px;flex-shrink:0;}
.cal-main-title{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:800;color:var(--text);letter-spacing:-.03em;white-space:nowrap;}
.cal-title-icon{flex-shrink:0;color:#111827}
.topbar-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.today-btn{height:32px;padding:0 14px;border:1px solid var(--border);background:var(--panel);border-radius:8px;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;transition:all .14s ease;white-space:nowrap;font-family:inherit;}
.today-btn:hover:not(:disabled){background:#F9FAFB;border-color:var(--border-strong)}
.today-btn:disabled{opacity:.35;cursor:not-allowed}
.nav-pair{display:flex;gap:3px}
.nav-btn{width:30px;height:30px;border:1px solid var(--border);background:var(--panel);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted);cursor:pointer;transition:all .14s ease;font-family:inherit;}
.nav-btn:hover:not(:disabled){background:#F9FAFB;border-color:var(--border-strong);color:var(--text)}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
.month-picker{position:relative;display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:8px;cursor:pointer;font-size:15px;font-weight:700;color:var(--text);transition:background .14s ease;user-select:none;}
.month-picker:hover{background:#F3F4F6}
.mp-caret{color:var(--muted);transition:transform .16s ease;flex-shrink:0}
.month-picker.open .mp-caret{transform:rotate(180deg)}
.month-drop{position:absolute;top:calc(100% + 6px);right:0;z-index:300;background:var(--panel);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 28px rgba(0,0,0,.13);padding:6px;min-width:160px;opacity:0;pointer-events:none;transform:translateY(-6px);transition:opacity .14s ease,transform .14s ease;}
.month-drop.open{opacity:1;pointer-events:all;transform:translateY(0)}
.md-item{padding:8px 12px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:background .12s ease;}
.md-item:hover{background:#F3F4F6}
.md-item.cur{color:var(--blue);font-weight:700}
.view-toggle{display:flex;background:#F3F4F6;border-radius:8px;padding:2px;gap:2px;}
.vt-btn{height:28px;padding:0 12px;border:0;border-radius:6px;background:transparent;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .14s ease;font-family:inherit;}
.vt-btn.active{background:var(--panel);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.09);}

/* ─── FILTER STATUS PILL ─── */
.filter-status{position:absolute;left:50%;bottom:14px;z-index:14;display:inline-flex;align-items:center;justify-content:center;gap:8px;max-width:min(560px,calc(100% - 32px));min-height:36px;padding:8px 18px;border:1px solid rgba(229,231,235,.9);border-radius:999px;background:rgba(255,255,255,.92);color:var(--muted);box-shadow:0 14px 34px rgba(17,24,39,.12);backdrop-filter:blur(14px) saturate(1.12);-webkit-backdrop-filter:blur(14px) saturate(1.12);font-size:13px;line-height:1.2;white-space:nowrap;opacity:0;pointer-events:none;transform:translate(-50%,10px);transition:opacity .2s ease,transform .2s ease;}
.filter-status.on{opacity:1;transform:translate(-50%,0)}
.filter-status strong{color:var(--text);font-weight:700}
.filter-status em{color:var(--blue);font-style:normal;font-weight:600}

/* ─── CAL WRAPPER ─── */
.cal-wrapper{position:relative;height:calc(100vh - 148px);flex-shrink:0;background:var(--panel);border:1px solid var(--border);border-radius:20px;overflow:hidden;display:flex;flex-direction:column;}
.cal-wrapper::after{content:"";position:absolute;inset:0;z-index:15;pointer-events:none;opacity:0;background:rgba(255,255,255,.62);backdrop-filter:blur(5px) saturate(1.08);-webkit-backdrop-filter:blur(5px) saturate(1.08);transition:opacity .2s ease;}
.cal-wrapper.has-detail::after{opacity:1;pointer-events:all}

/* ─── MONTH VIEW ─── */
.day-hdr-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);flex:1;min-height:0;grid-auto-rows:1fr}
.day-hdr{height:34px;display:flex;align-items:center;justify-content:center;font-size:11.5px;color:var(--muted);font-weight:700;letter-spacing:.04em;border-bottom:1px solid var(--border);background:var(--panel);}
.day-cell{position:relative;min-height:0;padding:7px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--panel);overflow:hidden;transition:background .14s ease;display:flex;flex-direction:column;}
.day-cell.has-bday:not(.has-events) .d-chips{position:absolute;top:0;left:0;right:0;bottom:0;display:flex!important;flex-direction:column;align-items:center;justify-content:center;width:100%;margin:0;}
.day-cell:nth-child(7n){border-right:0}
.day-cell.outside{opacity:.3}
.day-cell.today .d-num{background:var(--text);color:#fff;width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;}
.day-cell.has-events{cursor:pointer}
.day-cell.has-events:hover{background:#F3F4F6}
.d-num{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.d-chips{display:grid;gap:3px;margin-top:2px}

/* ─── WEEK VIEW ─── */
.week-grid-inner{display:grid;grid-template-columns:repeat(7,1fr);height:100%}
.week-col{display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden;}
.week-col:last-child{border-right:0}
.week-hdr{text-align:center;padding:9px 4px 7px;border-bottom:1px solid var(--border);background:var(--panel);flex-shrink:0;}
.wh-day{display:block;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.wh-num{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;font-size:15px;font-weight:700;color:var(--text);margin-top:3px;}
.wh-num.today{background:var(--text);color:#fff}
.week-body{flex:1;padding:5px;overflow-y:auto;display:flex;flex-direction:column;gap:3px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.week-body.has-svc{cursor:pointer}
.week-body.has-svc:hover{background:#F3F4F6}

/* ─── SERVICE CARDS ─── */
.svc-card{border:0;width:100%;text-align:left;border-radius:9px;padding:3px 6px;cursor:pointer;transition:transform .18s ease,box-shadow .18s ease;box-shadow:0 4px 12px rgba(0,0,0,.08);overflow:hidden;font-family:inherit;}
.svc-card:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(0,0,0,.12)}
.svc-card.wed{background:var(--blue);color:#fff}.svc-card.wed:hover{background:var(--blue-hover)}
.svc-card.sun{background:var(--yellow);color:var(--text)}.svc-card.sun:hover{background:var(--yellow-hover)}
.svc-card.sat{background:var(--sat-green);color:#064E3B}.svc-card.sat:hover{background:var(--sat-green-hover)}
.svc-time{display:block;font-size:7.5px;font-weight:600;line-height:1.1;margin-bottom:1px;opacity:.85}
.svc-name{display:block;font-size:9.5px;font-weight:700;line-height:1.1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.week-body .svc-card{padding:5px 8px;border-radius:10px;margin-bottom:2px}
.week-body .svc-time{font-size:9px}
.week-body .svc-name{font-size:11.5px}

/* ─── MESES 5 FILAS ─── */
.cal-grid[data-weeks="5"] .day-cell{padding:5px 6px}
.cal-grid[data-weeks="5"] .d-num{font-size:12px;margin-bottom:2px}
.cal-grid[data-weeks="5"] .d-chips{gap:2px;margin-top:1px}
.cal-grid[data-weeks="5"] .svc-card{padding:2px 5px}
.cal-grid[data-weeks="5"] .svc-time{font-size:7px}
.cal-grid[data-weeks="5"] .svc-name{font-size:9px}
/* ─── MESES 6 FILAS ─── */
.cal-grid[data-weeks="6"] .day-cell{padding:5px 6px}
.cal-grid[data-weeks="6"] .d-num{font-size:12px;margin-bottom:2px}
.cal-grid[data-weeks="6"] .d-chips{gap:2px;margin-top:1px}
.cal-grid[data-weeks="6"] .svc-card{padding:2px 5px}
.cal-grid[data-weeks="6"] .svc-time{font-size:7px}
.cal-grid[data-weeks="6"] .svc-name{font-size:9px}
/* ─── MÓVIL: mantener legibilidad ─── */
@media(max-width:900px){
  .cal-grid[data-weeks="5"] .svc-card,.cal-grid[data-weeks="6"] .svc-card{padding:2px 5px}
  .cal-grid[data-weeks="5"] .svc-time,.cal-grid[data-weeks="6"] .svc-time{font-size:7.5px;margin-bottom:1px}
  .cal-grid[data-weeks="5"] .svc-name,.cal-grid[data-weeks="6"] .svc-name{font-size:9.5px}
  .cal-grid[data-weeks="5"] .day-cell,.cal-grid[data-weeks="6"] .day-cell{padding:5px}
  .cal-grid[data-weeks="5"] .d-num,.cal-grid[data-weeks="6"] .d-num{font-size:12px;margin-bottom:2px}
  .cal-grid[data-weeks="5"] .d-chips,.cal-grid[data-weeks="6"] .d-chips{gap:2px;margin-top:1px}
}

/* ─── FLOATING DETAIL ─── */
.service-detail-floating{position:fixed;left:var(--detail-left,50%);top:var(--detail-top,96px);width:min(400px,calc(100vw - 32px));height:auto;max-height:calc(100vh - 32px);overflow-y:auto;overscroll-behavior:contain;background:var(--panel);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow);padding:16px;z-index:160;animation:floatIn .22s ease-out;scrollbar-width:thin;scrollbar-color:var(--border) transparent;font-family:'Plus Jakarta Sans',sans-serif;}
.service-detail-floating::-webkit-scrollbar{width:4px}
.service-detail-floating::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.service-detail-floating.is-closing{animation:floatOut .16s ease-in forwards}
@keyframes floatIn{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes floatOut{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(8px) scale(.98)}}
.detail-header-row{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:8px;}
.detail-date-line{display:flex;align-items:center;gap:8px;color:#374151;font-size:13px;}
.close-detail{width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;border:0;border-radius:8px;background:transparent;color:#374151;cursor:pointer;transition:background .14s ease;flex-shrink:0;font-family:inherit;}
.close-detail:hover{background:#F3F4F6}
.time-tabs{display:flex;gap:6px;margin:8px 0 12px;flex-wrap:wrap}
.time-tab{height:28px;padding:0 12px;border-radius:999px;border:1px solid var(--border);background:var(--panel);font-size:13px;color:#374151;cursor:pointer;transition:all .14s ease;font-family:inherit;}
.time-tab:hover{background:#F9FAFB;border-color:var(--border-strong)}
.time-tab.active{background:var(--text);color:#fff;border-color:var(--text)}
.principal-block{display:grid;grid-template-columns:46px 1fr;gap:10px;align-items:center;padding-bottom:10px;border-bottom:1px solid var(--border);}
.principal-name{margin:0;color:var(--text);font-size:21px;line-height:1.15;font-weight:800}
.principal-role{margin-top:2px;color:#374151;font-size:13px;font-weight:500}
.detail-section{padding:9px 0;border-bottom:1px solid var(--border)}
.detail-section:last-of-type{border-bottom:none}
.detail-section-title{margin:0 0 6px;color:#374151;font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;text-align:center;}
.detail-list{display:grid;gap:4px}
.detail-row{display:flex;align-items:center;gap:8px;color:#374151;font-size:12px;}
.detail-row strong{flex-shrink:0;}
.detail-row .detail-row-val{margin-left:auto;text-align:right;}
.detail-row strong{color:var(--text);font-size:12px;font-weight:600}
.detail-row .na{color:var(--red);font-weight:600;font-size:11.5px;font-style:italic}

/* ─── UNIFORM ─── */
.uniform-section{margin-top:10px;padding:10px;border-radius:16px;background:#F9FAFB;border:1px solid var(--border);color:#374151;font-size:13px;line-height:1.35;}
.uniform-section strong{display:flex;align-items:center;gap:8px;margin-bottom:8px;color:var(--text);font-size:13px;}
.uniform-visual{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px;margin-top:8px;}
.uniform-visual.uniform-gala{grid-template-columns:repeat(2,minmax(0,1fr))}
.uniform-piece{--piece-fill:#FFFFFF;--piece-stroke:#6B7280;min-height:46px;display:flex;align-items:center;gap:9px;padding:7px;border:1px solid var(--border);border-radius:12px;background:#fff;}
.uniform-piece svg{width:21px;height:21px;stroke:var(--piece-stroke);stroke-width:1.8;fill:var(--piece-fill);stroke-linecap:round;stroke-linejoin:round;flex:none;}
.uniform-piece .uniform-shape{fill:var(--piece-fill);stroke:var(--piece-stroke)}
.uniform-piece .uniform-detail{fill:none;stroke:var(--piece-stroke);opacity:.58}
.uniform-piece .uniform-dot{fill:rgba(255,255,255,.62);stroke:none}
.uniform-piece .uniform-tie{fill:var(--piece-accent,#111827);stroke:var(--piece-accent,#111827)}
.uniform-piece.icon-only{min-height:54px;justify-content:center;padding:8px}
.uniform-piece.icon-only svg{width:34px;height:34px}
.uniform-piece span{display:block;color:var(--text);font-size:11px;font-weight:700;line-height:1.2}
.uniform-piece small{display:block;color:var(--muted);font-size:10px;font-weight:500;line-height:1.2}
.uniform-fallback{color:#374151;font-size:13px;line-height:1.35}

/* ─── MOBILE CLEAR FILTER ─── */
.fs-clear-btn{display:inline-flex;align-items:center;justify-content:center;margin-left:6px;padding:0;width:20px;height:20px;border:2px solid #EF4444;background:transparent;cursor:pointer;flex-shrink:0;border-radius:50%;transition:background .14s,border-color .14s;vertical-align:middle;}
.fs-clear-btn:hover{background:rgba(239,68,68,.12)}

/* ─── MOBILE FILTER PANEL ─── */
.mob-filter-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:150;}
.mob-filter-overlay.open{display:block}
.mob-filter-panel{display:none;position:fixed;inset:auto 0 0 0;max-height:86vh;transform:translateY(110%);transition:transform .22s ease;background:var(--panel);border-radius:24px 24px 0 0;box-shadow:var(--shadow);padding:22px 18px 40px;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;z-index:151;}
.mob-filter-panel.open{transform:translateY(0)}
.mfp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.mfp-title{font-size:16px;font-weight:700}
.icon-btn{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted);cursor:pointer;transition:background .12s;border:none;background:transparent;font-family:inherit;}
.icon-btn:hover{background:#F3F4F6}

/* ─── RESPONSIVE ─── */
@media(max-width:900px){
  .layout{display:block;height:auto;overflow:visible}
  .sidebar{display:none}
  .cal-section{padding:10px 10px 0;overflow:visible}
  .cal-wrapper{height:calc(100dvh - 155px)}
  .hdr-filter-btn{display:flex}
  /* Show mobile filter panel (off-screen, for animation) */
  .mob-filter-panel{display:block}
  /* mob-filter-overlay stays hidden until .open class is added — DO NOT set display:block here */
  .day-cell{padding:5px}
  .d-num{font-size:12px}
  .svc-card{padding:2px 5px}
  .cal-main-title{font-size:14px;gap:6px}
  .month-picker{font-size:13px;padding:4px 7px}
}
/* ─── DETAIL OVERLAY (mobile) ─── */
.detail-overlay{display:none;position:fixed;inset:0;background:rgba(8,8,14,.78);z-index:150;opacity:0;pointer-events:none;transition:opacity .22s ease;}
@media(max-width:768px){
  .service-detail-floating{
    position:fixed!important;
    left:max(16px,calc(50% - 160px))!important;
    right:max(16px,calc(50% - 160px))!important;
    top:50%!important;
    bottom:auto!important;
    width:auto!important;
    height:auto!important;
    max-height:80vh!important;
    transform:translateY(-50%)!important;
    overflow-y:auto;
    overscroll-behavior:contain;
    -webkit-overflow-scrolling:touch;
    padding-bottom:12px;
    border-radius:20px!important;
    animation:cardIn .22s ease-out!important;
  }
  .service-detail-floating.is-closing{animation:cardOut .16s ease-in forwards!important}
  @keyframes cardIn{from{opacity:0;transform:translateY(calc(-50% + 28px))}to{opacity:1;transform:translateY(-50%)}}
  @keyframes cardOut{from{opacity:1;transform:translateY(-50%)}to{opacity:0;transform:translateY(calc(-50% + 16px))}}
  .detail-overlay{display:block;}
  .detail-overlay.on{opacity:1;pointer-events:all;}
  /* Filter badge: flow below calendar on mobile instead of overlapping last row */
  .filter-status{position:relative!important;left:auto!important;bottom:auto!important;transform:none!important;opacity:0;margin:8px 0;align-self:center;pointer-events:none;}
  .filter-status.on{opacity:1!important;transform:none!important;pointer-events:auto;display:inline-flex!important;}
}
@media(max-width:540px){
  .cal-topbar{gap:6px}
  .today-btn{padding:0 10px;font-size:12px;height:28px}
  .vt-btn{padding:0 8px;font-size:12px}
  .cal-main-title{font-size:11px;gap:4px}
  .month-picker{font-size:12px;padding:4px 6px}
}
@media(max-width:480px){
  .day-cell{padding:4px 3px}
}

/* ─── STATS PANEL ─── */
.stats-panel{display:none;flex-direction:column;gap:14px;padding:16px 0 32px;flex-shrink:0}
.stats-panel.active{display:flex}
.stat-card{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:18px 16px;box-shadow:0 2px 14px rgba(0,0,0,.06)}
.stat-title{font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.10em;color:#111827;margin:0 0 14px;text-align:center}

/* ─── BIRTHDAY ─── */
.bday-chip{display:flex;flex-direction:column;align-items:center;gap:1px;padding:3px 4px;border-radius:0;background:transparent;border:none;line-height:1.3;margin-top:0;overflow:hidden;width:100%;box-sizing:border-box;text-align:center;}
.bday-chip .bday-emoji{font-size:clamp(10px,2vw,14px);line-height:1;}
.bday-chip strong{color:#111827;font-weight:800;font-size:clamp(7.5px,1.75vw,10px);line-height:1.2;display:block;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;}
/* chip compacto cuando hay servicios en el mismo día */
.day-cell.has-events.has-bday .bday-chip{flex-direction:row;gap:3px;padding:1px 3px;margin-bottom:2px;}
.day-cell.has-events.has-bday .bday-chip strong{font-size:clamp(7px,1.6vw,9px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* chip grande cuando el día solo tiene cumpleaños */
.day-cell.has-bday:not(.has-events) .bday-chip .bday-emoji{font-size:25px;}
.day-cell.has-bday:not(.has-events) .bday-chip strong{font-size:10px;}
.day-cell.has-bday{background:#FFF0F7;}
.day-cell.has-bday .d-num{color:#BE185D;}

/* ─── BIRTHDAY CARD ─── */
.bday-overlay{display:block;position:fixed;inset:0;background:transparent;z-index:150;pointer-events:none;}
.bday-overlay.on{pointer-events:all;}
.bday-card{position:fixed;left:max(16px,calc(50% - 160px));right:max(16px,calc(50% - 160px));top:50%;transform:translateY(-50%);background:linear-gradient(145deg,#FF6B9D 0%,#FF8FAB 40%,#FFB3C6 100%);border-radius:24px;padding:32px 24px;z-index:160;box-shadow:0 20px 60px rgba(255,107,157,.4);text-align:center;animation:bdayIn .28s cubic-bezier(.34,1.56,.64,1);}
.bday-card.is-closing{animation:bdayOut .18s ease-in forwards}
@keyframes bdayIn{from{opacity:0;transform:translateY(calc(-50% + 24px)) scale(.92)}to{opacity:1;transform:translateY(-50%) scale(1)}}
@keyframes bdayOut{from{opacity:1;transform:translateY(-50%) scale(1)}to{opacity:0;transform:translateY(calc(-50% + 16px)) scale(.95)}}
.bday-card-emoji{font-size:52px;line-height:1;margin-bottom:12px;display:block;filter:drop-shadow(0 4px 8px rgba(0,0,0,.15))}
.bday-card-label{font-size:13px;font-weight:700;color:rgba(255,255,255,.85);letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.bday-card-name{font-size:22px;font-weight:900;color:#fff;letter-spacing:-.02em;margin-bottom:6px;text-shadow:0 2px 8px rgba(0,0,0,.15)}
.bday-card-date{font-size:14px;font-weight:600;color:rgba(255,255,255,.85);margin-bottom:20px}
.bday-card-close{border:none;background:rgba(255,255,255,.25);color:#fff;font-size:13px;font-weight:700;padding:10px 28px;border-radius:99px;cursor:pointer;backdrop-filter:blur(8px);transition:background .15s;font-family:inherit}
.bday-card-close:hover{background:rgba(255,255,255,.4)}
</style>

function colorInfo(name=""){
  const key=name.normalize("NFD").replace(/[̀-ͯ]/g,"").toUpperCase().trim();
  const map={ROJO:{fill:"#DC2626",stroke:"#991B1B",text:"Rojo"},NEGRO:{fill:"#111827",stroke:"#020617",text:"Negro"},GRIS:{fill:"#9CA3AF",stroke:"#6B7280",text:"Gris"},BLANCO:{fill:"#FFFFFF",stroke:"#D1D5DB",text:"Blanco"},AZUL:{fill:"#2563EB",stroke:"#1D4ED8",text:"Azul"},VERDE:{fill:"#16A34A",stroke:"#15803D",text:"Verde"},AMARILLO:{fill:"#FACC15",stroke:"#CA8A04",text:"Amarillo"},NARANJA:{fill:"#F97316",stroke:"#C2410C",text:"Naranja"},LILA:{fill:"#C4B5FD",stroke:"#7C3AED",text:"Lila"},DORADO:{fill:"#D97706",stroke:"#B45309",text:"Dorado"},BEIGE:{fill:"#D6C3A5",stroke:"#A78B65",text:"Beige"},CAFE:{fill:"#92400E",stroke:"#78350F",text:"Café"},MORADO:{fill:"#7C3AED",stroke:"#6D28D9",text:"Morado"},ROSADO:{fill:"#EC4899",stroke:"#DB2777",text:"Rosado"}};
  return map[key]||null;
}
function parseUniform(u=""){const t=u.trim();if(!t||/no asignado/i.test(t)||t.length>34)return null;const p=t.split(/\s+Y\s+|\s*,\s*|\s*\/\s*/i).map(x=>x.trim()).filter(Boolean);const top=colorInfo(p[0]);const bot=colorInfo(p[1]||p[0]);if(!top||!bot)return null;return{top,bot};}
function uniformPiece(icon,label,color){return `<div class="uniform-piece" style="--piece-fill:${color.fill};--piece-stroke:${color.stroke};">${icon}<span>${label}<small>${color.text}</small></span></div>`;}
function uniformIconOnly(icon,color,accent="#111827"){return `<div class="uniform-piece icon-only" style="--piece-fill:${color.fill};--piece-stroke:${color.stroke};--piece-accent:${accent};">${icon}</div>`;}
function uniformLabel(u){const t=String(u||"").trim();if(!t||/no asignado/i.test(t))return "";return t.charAt(0).toUpperCase()+t.slice(1).toLowerCase();}
function renderUniform(u){
  const key=String(u||"").normalize("NFD").replace(/[̀-ͯ]/g,"").toUpperCase().trim();

}

function vocalistas(){const s=new Set();monthEntries().forEach(d=>d.services.forEach(sv=>{if(sv.vocalista&&sv.vocalista!=="No asignado")s.add(sv.vocalista);}));return [...s].sort((a,b)=>a.localeCompare(b,"es"));}
function vocesApoyo(){const s=new Set();monthEntries().forEach(d=>d.services.forEach(sv=>{sv.voces.forEach(v=>{if(v&&v!=="No asignado")s.add(v);});}));return [...s].sort((a,b)=>a.localeCompare(b,"es"));}
function musicos(){const s=new Set();monthEntries().forEach(d=>d.services.forEach(sv=>{INST_KEYS.forEach(k=>{if(sv[k]&&sv[k]!=="No asignado")s.add(sv[k]);});}));return [...s].sort((a,b)=>a.localeCompare(b,"es"));}

const PAL=[{bg:"#DBEAFE",c:"#1E40AF"},{bg:"#FEF3C7",c:"#92400E"},{bg:"#D1FAE5",c:"#065F46"},{bg:"#EDE9FE",c:"#5B21B6"},{bg:"#FCE7F3",c:"#9D174D"},{bg:"#FFEDD5",c:"#9A3412"},{bg:"#CCFBF1",c:"#0F766E"},{bg:"#E0F2FE",c:"#0369A1"},{bg:"#F0FDF4",c:"#15803D"},{bg:"#FEE2E2",c:"#991B1B"}];
function pal(n){let h=0;for(let i=0;i<n.length;i++)h=n.charCodeAt(i)+((h<<5)-h);return PAL[Math.abs(h)%PAL.length];}
function initials(n){const p=n.split(" ");return(p[0][0]+(p[1]?p[1][0]:"")).toUpperCase();}

/* ─── FILTER ─── */
function filterHTML(){
  const q=S.filterSearch.toLowerCase();
  const clearBtn=S.filter?`<button class="filter-clear-icon" onclick="clearFilter()" title="Borrar filtro"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m15 9-6 6M9 9l6 6"/></svg></button>`:"";
  function minItem(name,role){
    if(q&&!name.toLowerCase().includes(q))return "";
    const p=pal(name);const cnt=countSvcsRole(name,role);if(!cnt)return "";const act=S.filter===name&&S.filterRoles.has(role);
    return `<div class="min-item${act?" active":""}" data-n="${name}" data-r="${role}" onclick="setFilter(this.dataset.n,this.dataset.r)">
      <div class="avatar" style="background:${p.bg};color:${p.c}">${initials(name)}</div>
      <span class="min-name">${name}</span>
      <span class="min-count">${cnt}</span>
    </div>`;
  }
  function grp(label,names,role){const h=names.map(n=>minItem(n,role)).join("");return h?`<div class="sidebar-sec"><p class="sec-label">${label}</p><div class="min-list">${h}</div></div>`:""}
  return `
  <div class="sidebar-sec" style="margin-bottom:8px">
    <div style="display:flex;align-items:center;gap:6px">
      <div class="search-wrap" style="flex:1;margin-bottom:0">
        <span class="s-icon">${IC.search}</span>
        <input type="text" placeholder="Buscar nombre…" value="${S.filterSearch}" oninput="onSearch(this.value)">
      </div>
      ${clearBtn}
    </div>
  </div>
  ${grp("Vocalistas Principales",vocalistas(),"vocalista")}
  ${grp("Voces de Apoyo",vocesApoyo(),"voz")}
  ${grp("Músicos",musicos(),"musico")}
  <div class="sidebar-sec">
    <p class="sec-label">🎂 Cumpleaños</p>
    ${(()=>{const mm=S.month.split("-")[1];const rows=Object.entries(BIRTHDAYS).filter(([k])=>k.split("-")[0]===mm).sort((a,b)=>a[0].localeCompare(b[0])).flatMap(([mmdd,names])=>names.map(n=>`<div class="bday-list-row"><span class="bday-list-date">${BDAY_DATES[n]||mmdd}</span><span class="bday-list-name">${n}</span></div>`));return rows.length?rows.join(""):`<div style="font-size:12px;color:var(--muted);padding:4px 0">Sin cumpleaños este mes</div>`;})()}
  </div>`;
}
function renderFilter(){const h=filterHTML();$("deskFilterBody").innerHTML=h;$("mobFilterBody").innerHTML=h;}
function onSearch(v){
  S.filterSearch=v;
  const wasDesk=!!document.activeElement?.closest("#deskFilterBody");
  const wasMob=!!document.activeElement?.closest("#mobFilterBody");
  renderFilter();
  if(wasDesk){const inp=$("deskFilterBody").querySelector("input[type='text']");if(inp){inp.focus();inp.setSelectionRange(v.length,v.length);}}
  else if(wasMob){const inp=$("mobFilterBody").querySelector("input[type='text']");if(inp){inp.focus();inp.setSelectionRange(v.length,v.length);}}
}
function setFilter(name,role){
  if(S.filter===name){
    if(S.filterRoles.has(role))S.filterRoles.delete(role);else S.filterRoles.add(role);
    if(S.filterRoles.size===0)S.filter=null;
  } else {
    S.filter=name;S.filterRoles=new Set(role?[role]:[]);
  }
  closeMobFilter();renderAll();
}

const TYPE_COLOR={wed:'#2563EB',sat:'#4ADE80',sun:'#FACC15'};
const TYPE_LABEL_S={wed:'Miércoles',sat:'Sábado',sun:'Domingo'};
const ROLE_COLOR={vocalista:'#8B5CF6',voz:'#EC4899',musico:'#F97316'};
const ROLE_LABEL_S={vocalista:'Vocalista Principal',voz:'Voz de Apoyo',musico:'Músico'};
function getMonthWeekStarts(month){
  const [yr,mo]=month.split('-').map(Number);
  const first=new Date(yr,mo-1,1);
  const dow=first.getDay()===0?6:first.getDay()-1; // Monday=0
  const monBefore=new Date(yr,mo-1,1-dow);
  const days=new Date(yr,mo,0).getDate();
  const weeks=[];
  let d=new Date(monBefore);
  while(d<new Date(yr,mo-1,days+1)){
    const s=d.toISOString().slice(0,10);
    weeks.push(s);
    d=new Date(d.getTime()+7*86400000);
  }
  return weeks;
}

function computeStats(name){
  const monthData=Object.entries(DATA).filter(([k])=>k.startsWith(S.month));
  const WEEK_STARTS=getMonthWeekStarts(S.month);
  const nextMonth=S.month.slice(0,4)+'-'+String(Number(S.month.slice(5,7))%12+1).padStart(2,'0');
  const byType={wed:0,sat:0,sun:0};
  const byRole={vocalista:0,voz:0,musico:0};
  const byWeek=WEEK_STARTS.map(()=>({wed:0,sat:0,sun:0}));
  const activeRoles=S.filterRoles&&S.filterRoles.size>0?S.filterRoles:new Set(['vocalista','voz','musico']);
  monthData.forEach(([dk,dd])=>{
    dd.services.forEach(sv=>{
      const participates=[...activeRoles].some(r=>inSvcByRole(name,r,sv));
      if(!participates)return;
      byType[dd.type]++;
      if(activeRoles.has('vocalista')&&sv.vocalista===name)byRole.vocalista++;
      if(activeRoles.has('voz')&&sv.voces.includes(name))byRole.voz++;
      if(activeRoles.has('musico')&&INST_KEYS.some(k=>sv[k]===name))byRole.musico++;
      const wi=WEEK_STARTS.findIndex((ws,i)=>dk>=ws&&dk<(WEEK_STARTS[i+1]||nextMonth+'-01'));
      if(wi>=0)byWeek[wi][dd.type]++;
    });
  });
  // rest dates: service dates in month where minister has no participation in selected roles
  const restDates=[];
  monthData.forEach(([dk,dd])=>{
    const inAny=dd.services.some(sv=>[...activeRoles].some(r=>inSvcByRole(name,r,sv)));
    if(!inAny)restDates.push(dk);
  });
  return{byType,byRole,byWeek,restDates,weekStarts:WEEK_STARTS};
}

function renderDonut(byType){
  const total=byType.wed+byType.sat+byType.sun;
  if(!total)return`<p style="text-align:center;color:var(--muted);font-size:13px">Sin servicios</p>`;
  const R=50,CX=68,CY=68,circ=2*Math.PI*R;
  let off=0,slices='',legend='';
  [['wed',byType.wed],['sat',byType.sat],['sun',byType.sun]].forEach(([t,c])=>{
    if(!c)return;
    const dash=(c/total)*circ;
    slices+=`<circle cx="${CX}" cy="${CY}" r="${R}" fill="none" stroke="${TYPE_COLOR[t]}" stroke-width="22" stroke-dasharray="${dash.toFixed(2)} ${circ.toFixed(2)}" stroke-dashoffset="${(-off).toFixed(2)}" transform="rotate(-90 ${CX} ${CY})"/>`;
    legend+=`<div style="display:flex;align-items:center;gap:8px;padding:3px 0"><span style="width:10px;height:10px;border-radius:50%;background:${TYPE_COLOR[t]};flex-shrink:0;display:inline-block"></span><span style="font-size:12px;color:var(--muted);flex:1">${TYPE_LABEL_S[t]}</span><span style="font-size:14px;font-weight:800;color:${TYPE_COLOR[t]}">${c}</span></div>`;
    off+=dash;
  });
  return`<div style="display:flex;align-items:center;gap:20px">
    <svg width="136" height="136" viewBox="0 0 136 136" style="flex-shrink:0">
      <circle cx="${CX}" cy="${CY}" r="${R}" fill="none" stroke="var(--border)" stroke-width="22"/>
      ${slices}
      <text x="${CX}" y="${CY-5}" text-anchor="middle" font-size="22" font-weight="900" fill="var(--text)" font-family="inherit">${total}</text>
      <text x="${CX}" y="${CY+13}" text-anchor="middle" font-size="8" font-weight="700" fill="var(--muted)" font-family="inherit" letter-spacing="1">SERVICIOS</text>
    </svg>
    <div style="flex:1;display:flex;flex-direction:column;gap:2px">${legend}</div>
  </div>`;
}

function renderRoles(byRole){
  const max=Math.max(byRole.vocalista,byRole.voz,byRole.musico,1);
  const rows=[['vocalista','Vocalista Principal'],['voz','Voz de Apoyo'],['musico','Músico']].map(([r,lbl])=>{
    const c=byRole[r];if(!c)return'';
    const pct=Math.round((c/max)*100);
    return`<div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px">
        <span style="font-size:12px;color:var(--muted)">${lbl}</span>
        <span style="font-size:13px;font-weight:800;color:${ROLE_COLOR[r]}">${c}</span>
      </div>
      <div style="height:9px;background:var(--border);border-radius:99px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:${ROLE_COLOR[r]};border-radius:99px"></div>
      </div>
    </div>`;
  }).join('');
  return rows||`<p style="text-align:center;color:var(--muted);font-size:13px">Sin rol asignado</p>`;
}

function renderWeeks(byWeek){
  const lbls=['Sem 1','Sem 2','Sem 3','Sem 4','Sem 5'];
  const LBL_W=36,BAR_AREA=30,ROW_H=20,BAR_T=11,GAP=7;
  const maxTotal=Math.max(...byWeek.map(w=>w.wed+w.sat+w.sun),1);
  const svgH=byWeek.length*(ROW_H+GAP)-GAP;
  const rows=byWeek.map((wk,i)=>{
    const total=wk.wed+wk.sat+wk.sun;
    const y=i*(ROW_H+GAP);
    const barY=y+(ROW_H-BAR_T)/2;
    // empty track
    let bars=`<rect x="${LBL_W}" y="${barY}" width="${BAR_AREA}" height="${BAR_T}" fill="var(--border)" rx="5" ry="5"/>`;
    if(total){
      let x=LBL_W;
      [['wed',wk.wed],['sat',wk.sat],['sun',wk.sun]].forEach(([t,c],si)=>{
        if(!c)return;
        const w=Math.round((c/maxTotal)*BAR_AREA);
        // rounded corners: left on first segment, right on last
        bars+=`<rect x="${x}" y="${barY}" width="${w}" height="${BAR_T}" fill="${TYPE_COLOR[t]}" rx="5" ry="5"/>`;
        x+=w;
      });
      // count label at end of bar
      const totalW=Math.round((total/maxTotal)*BAR_AREA);
      bars+=`<text x="${LBL_W+totalW+5}" y="${y+ROW_H/2}" dominant-baseline="middle" font-size="10" font-weight="800" fill="#111827" font-family="inherit">${total}</text>`;
    }
    return`<g>
      <text x="${LBL_W-6}" y="${y+ROW_H/2}" text-anchor="end" dominant-baseline="middle" font-size="10" font-weight="700" fill="var(--muted)" font-family="inherit">${lbls[i]}</text>
      ${bars}
    </g>`;
  }).join('');
  const svgW=LBL_W+BAR_AREA+30;
  return`<svg width="100%" viewBox="0 0 ${svgW} ${svgH}" style="overflow:visible">${rows}</svg>`;
}

  const TYPE_LBL={wed:'Mié',sat:'Sáb',sun:'Dom'};
  const longFmt=new Intl.DateTimeFormat('es-CO',{day:'numeric',month:'long'});
  const items=restDates.map(dk=>{
    const dd=DATA[dk];const d=new Date(dk+'T12:00:00');
    const label=longFmt.format(d);
    const dot=`<span style="width:8px;height:8px;border-radius:50%;background:${TYPE_DOT[dd.type]};display:inline-block;flex-shrink:0"></span>`;

  }).join('');
  return`<div style="display:flex;flex-direction:column;gap:6px">${items}</div>`;
}

function renderMonthView(){
  const [yr,mo]=S.month.split("-").map(Number);
  $("dayHdrGrid").style.display="grid";
  $("dayHdrGrid").innerHTML=DAYS_HDR.map(d=>`<div class="day-hdr">${d}</div>`).join("");
  const first=new Date(yr,mo-1,1);
  const off=first.getDay()===0?6:first.getDay()-1;
  const days=new Date(yr,mo,0).getDate();
  const todayStr=todayKey();
  let h="";
  for(let i=0;i<off;i++)h+=`<div class="day-cell outside"></div>`;
  for(let d=1;d<=days;d++){
    const dk=`${yr}-${String(mo).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const dd=DATA[dk];const isToday=dk===todayStr;
    const mmdd=`${String(mo).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const bdayNames=BIRTHDAYS[mmdd]||[];
    const bdayChip=bdayNames.length?bdayNames.map(n=>{const parts=n.split(" ");const first=parts[0];const last=parts.slice(1).join(" ");return`<button class="bday-chip" onclick="event.stopPropagation();openBdayCard('${n}','${mmdd}')" style="border:none;cursor:pointer;font-family:inherit;text-align:left;width:100%"><span class="bday-emoji">🎂</span><strong><span style="display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${first}</span></strong></button>`;}).join(""):"";
    const hasBday=bdayNames.length>0;
    if(dd){
      const svcs=filteredSvcs(dd.services);
      const cards=svcs.map(sv=>`<button class="svc-card ${dd.type}" data-dk="${dk}" data-i="${dd.services.indexOf(sv)}"><span class="svc-time">${sv.time.toUpperCase()}</span><span class="svc-name">${sv.vocalista.split(" ")[0]}</span></button>`).join("");
      const hasSvc=svcs.length>0;
      h+=`<div class="day-cell${hasSvc?" has-events":""}${isToday?" today":""}${hasBday?" has-bday":""}" data-dk="${dk}"><div class="d-num">${d}</div><div class="d-chips">${bdayChip}${cards}</div></div>`;
    } else {
      const cellClick=hasBday?`onclick="openBdayCard('${bdayNames[0]}','${mmdd}')" style="cursor:pointer"`:"";
      h+=`<div class="day-cell${isToday?" today":""}${hasBday?" has-bday":""}" data-dk="${dk}" ${cellClick}><div class="d-num">${d}</div><div class="d-chips">${bdayChip}</div></div>`;
    }
  }
  const numRows=Math.ceil((off+days)/7);
  $("calGrid").removeAttribute("style");$("calGrid").className="cal-grid";$("calGrid").innerHTML=h;$("calGrid").dataset.weeks=numRows;
  $("calGrid").querySelectorAll(".svc-card").forEach(btn=>{btn.addEventListener("click",e=>{e.stopPropagation();openDetail(btn.dataset.dk,Number(btn.dataset.i),btn);});});
  $("calGrid").querySelectorAll(".day-cell.has-events").forEach(cell=>{cell.addEventListener("click",e=>{if(e.target.closest(".svc-card"))return;const dd=DATA[cell.dataset.dk];if(!dd)return;const svcs=filteredSvcs(dd.services);if(!svcs.length)return;openDetail(cell.dataset.dk,0,cell);});});
}

function renderWeekView(){
  if(!S.weekStart)S.weekStart=getWeekStart(S.month+"-01");
  $("dayHdrGrid").style.display="none";$("dayHdrGrid").innerHTML="";
  const todayStr=todayKey();
  let h="";
  for(let i=0;i<7;i++){
    const dk=addDays(S.weekStart,i);const dd=DATA[dk];
    const d=new Date(dk+'T12:00:00');const isToday=dk===todayStr;
    const svcs=dd?filteredSvcs(dd.services):[];
    const cards=svcs.map(sv=>`<button class="svc-card ${dd.type}" data-dk="${dk}" data-i="${dd.services.indexOf(sv)}"><span class="svc-time">${sv.time.toUpperCase()}</span><span class="svc-name">${sv.vocalista.split(" ")[0]}</span></button>`).join("");
    h+=`<div class="week-col"><div class="week-hdr"><span class="wh-day">${DAYS_HDR[i]}</span><span class="wh-num${isToday?" today":""}">${d.getDate()}</span></div><div class="week-body${svcs.length?" has-svc":""}" data-dk="${dk}">${cards}</div></div>`;
  }
  $("calGrid").className="cal-grid";$("calGrid").style.cssText="display:grid;grid-template-columns:repeat(7,1fr);flex:1;min-height:0;height:100%";
  $("calGrid").innerHTML=h;
  $("calGrid").querySelectorAll(".svc-card").forEach(btn=>{btn.addEventListener("click",e=>{e.stopPropagation();openDetail(btn.dataset.dk,Number(btn.dataset.i),btn);});});
  $("calGrid").querySelectorAll(".week-body.has-svc").forEach(body=>{body.addEventListener("click",e=>{if(e.target.closest(".svc-card"))return;const dd=DATA[body.dataset.dk];if(!dd)return;const svcs=filteredSvcs(dd.services);if(!svcs.length)return;openDetail(body.dataset.dk,0,body);});});
}

/* ─── DETAIL ─── */
const detailMount=$("detailMount");const calWrapper=$("calWrapper");
const longDate=new Intl.DateTimeFormat("es-CO",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
function rememberAnchor(el){if(!el)return;const r=el.getBoundingClientRect();S.detailAnchor={left:r.left,right:r.right,top:r.top,bottom:r.bottom};}
function positionPanel(){
  const panel=detailMount.querySelector(".service-detail-floating");
  if(!panel||!S.detailAnchor||window.matchMedia("(max-width:768px)").matches)return;
  const gap=14,margin=16,pw=panel.offsetWidth,ph=panel.offsetHeight,vw=window.innerWidth,vh=window.innerHeight;
  let left=S.detailAnchor.right+gap;
  if(left+pw>vw-margin)left=S.detailAnchor.left-pw-gap;
  if(left<margin)left=Math.min(Math.max(S.detailAnchor.left,margin),vw-pw-margin);
  let top=S.detailAnchor.top;
  if(top+ph>vh-margin)top=vh-ph-margin;
  if(top<margin)top=margin;
  panel.style.setProperty("--detail-left",`${Math.round(left)}px`);panel.style.setProperty("--detail-top",`${Math.round(top)}px`);
}

function renderDetail(){
  if(!S.selDate||!DATA[S.selDate]){detailMount.innerHTML="";calWrapper.classList.remove("has-detail");return;}
  const dd=DATA[S.selDate];
  const svcs=filteredSvcs(dd.services);
  if(!svcs.length){detailMount.innerHTML="";calWrapper.classList.remove("has-detail");return;}
  const si=Math.min(S.svcIdx,svcs.length-1);const sv=svcs[si];
  const dateLabel=longDate.format(new Date(`${S.selDate}T12:00:00`));
  const uLabel=uniformLabel(sv.uniforme);
  const voices=sv.voces.filter(v=>v&&v!=="No asignado");
  const hasMusicos=INST_KEYS.some(k=>!NA(sv[k]));
  const hl=n=>S.filter&&n===S.filter?`<span style="color:#1D4ED8;font-weight:900">${n}</span>`:n;
  const instRows=INST_KEYS.map(k=>{const val=sv[k];const na=NA(val);return `<div class="detail-row"><span>${instIcon(k)}</span><strong>${INST_LABELS[k]}</strong><span class="detail-row-val${na?" na":""}">${na?"No asignado":hl(val)}</span></div>`;}).join("");
  detailMount.innerHTML=`
    <aside class="service-detail-floating" aria-label="Detalle del servicio">
      <div class="detail-header-row">
        <div class="detail-date-line">${IC.cal}<span>${dateLabel}</span></div>
        <button class="close-detail" aria-label="Cerrar">${IC.x}</button>
      </div>
      <div class="time-tabs">${svcs.map((s,i)=>`<button class="time-tab${i===si?" active":""}" data-i="${i}">${s.time.toUpperCase()}</button>`).join("")}</div>
      <div class="detail-date-line" style="margin-bottom:16px;gap:6px;color:#6B7280;font-size:13px;">${IC.clock}<span>${sv.range}</span></div>
      <section class="principal-block"><span>${IC.mic}</span><div><h2 class="principal-name" style="${S.filter&&sv.vocalista===S.filter?"color:#1D4ED8":""}">${sv.vocalista}</h2><div class="principal-role">Vocalista Principal</div></div></section>
      ${voices.length>0?`<section class="detail-section"><h3 class="detail-section-title">Voces de Apoyo</h3><div class="detail-list">${voices.map(v=>`<div class="detail-row"><span>${IC.mic2}</span><strong>${hl(v)}</strong><span></span></div>`).join("")}</div></section>`:""}
      ${hasMusicos?`<section class="detail-section"><h3 class="detail-section-title">Equipo de Músicos</h3><div class="detail-list">${instRows}</div></section>`:""}
      <div class="uniform-section"><strong>${IC.tag} Uniforme${uLabel?" – "+uLabel:""}</strong>${renderUniform(sv.uniforme)}</div>
    </aside>`;
  calWrapper.classList.add("has-detail");
  $("detailOverlay").classList.add("on");
  const panel=detailMount.querySelector(".service-detail-floating");if(panel)panel.scrollTop=0;
  detailMount.querySelector(".close-detail").addEventListener("click",()=>closeDetail());
  detailMount.querySelectorAll(".time-tab").forEach(tab=>{tab.addEventListener("click",()=>{S.svcIdx=Number(tab.dataset.i);renderDetail();});});
  positionPanel();
}

function openDetail(dk,idx,anchor=null){if($('bdayCard'))return;if(!DATA[dk]||!DATA[dk].services.length)return;rememberAnchor(anchor);S.selDate=dk;S.svcIdx=idx;renderCalendar();renderDetail();}
function closeDetail(instant=false){
  $("detailOverlay").classList.remove("on");
  const panel=detailMount.querySelector(".service-detail-floating");
  if(!panel){calWrapper.classList.remove("has-detail");return;}
  if(instant){detailMount.innerHTML="";calWrapper.classList.remove("has-detail");return;}
  panel.classList.add("is-closing");
  setTimeout(()=>{S.selDate=null;S.svcIdx=0;S.detailAnchor=null;detailMount.innerHTML="";calWrapper.classList.remove("has-detail");renderCalendar();},150);
}

document.addEventListener("pointerdown",e=>{
  const panel=detailMount.querySelector(".service-detail-floating");
  if(!panel)return;if(panel.contains(e.target))return;if(e.target.closest(".svc-card"))return;
  closeDetail();
});
window.addEventListener("resize",positionPanel);

/* ─── MOBILE FILTER ─── */
function openMobFilter(){$("mobFilterOverlay").classList.add("open");$("mobFilterPanel").classList.add("open");}
function closeMobFilter(){$("mobFilterOverlay").classList.remove("open");$("mobFilterPanel").classList.remove("open");}
function clearFilter(){S.filter=null;S.filterRoles=new Set();S.filterSearch="";renderAll();}
function updateHdrBtn(){const btn=$("hdrFilterBtn");if(S.filter){btn.classList.add("has-filter");btn.innerHTML=`${IC.filter} ${initials(S.filter)}`;}else{btn.classList.remove("has-filter");btn.innerHTML=`${IC.filter} Ministro`;}}

/* ─── INIT ─── */
function renderAll(){if(!S.weekStart)S.weekStart=getWeekStart(S.month+"-01");renderFilter();renderCalendar();renderDetail();updateHdrBtn();}
renderAll();

/* ─── BIRTHDAY CARD ─── */
function openBdayCard(name, mmdd){
  const overlay=$('bdayOverlay');
  const mount=$('bdayMount');
  const dateStr=BDAY_DATES[name]||mmdd;
  mount.innerHTML=`<div class="bday-card" id="bdayCard">
    <span class="bday-card-emoji">🎂</span>
    <div class="bday-card-label">¡Feliz cumpleaños!</div>
    <div class="bday-card-name">${name}</div>
    <div class="bday-card-date">🎉 ${dateStr}</div>
    <button class="bday-card-close" onclick="closeBdayCard()">Cerrar</button>
  </div>`;
  overlay.classList.add('on');
  // blur calendar + block interactions
  calWrapper.classList.add('has-detail');
  document.body.style.overflow='hidden';
}
function closeBdayCard(){
  const overlay=$('bdayOverlay');
  const card=$('bdayCard');
  if(!card)return;
  card.classList.add('is-closing');
  setTimeout(()=>{
    $('bdayMount').innerHTML='';
    overlay.classList.remove('on');
    calWrapper.classList.remove('has-detail');
    document.body.style.overflow='';
  },180);
}

</script>
<div class="bday-overlay" id="bdayOverlay" onclick="closeBdayCard()"></div>
<div id="bdayMount"></div>
</body>
</html>
