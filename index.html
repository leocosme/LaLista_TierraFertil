<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Programación Tierra Fértil - Junio 2026</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="desktopSidebar">
      <div class="brand">
        <div class="brand-main">
          <span class="brand-icon" aria-hidden="true"><svg class="icon" viewBox="0 0 24 24"><path d="m2 8 5 4 5-7 5 7 5-4-2 11H4Z"></path></svg></span>
          <span>Tierra Fértil</span>
        </div>
        <svg class="icon small chevron" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"></path></svg>
      </div>
      <nav class="menu" aria-label="Secciones">
        <button class="menu-item active calendar-reset" type="button"><svg class="icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"></rect><path d="M16 2v4M8 2v4M3 10h18"></path></svg><span>Calendario</span></button>
        <button class="menu-item" type="button"><svg class="icon" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg><span>Equipo</span></button>
      </nav>
      <div id="filterContent"></div>
    </aside>

    <div class="filter-drawer" id="filterDrawer">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-main">
            <span class="brand-icon" aria-hidden="true"><svg class="icon" viewBox="0 0 24 24"><path d="m2 8 5 4 5-7 5 7 5-4-2 11H4Z"></path></svg></span>
            <span>Tierra Fértil</span>
          </div>
          <button class="close-detail" id="closeFilters" type="button" aria-label="Cerrar filtros"><svg class="icon small" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"></path></svg></button>
        </div>
        <nav class="menu" aria-label="Secciones móviles">
          <button class="menu-item active calendar-reset" type="button"><svg class="icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"></rect><path d="M16 2v4M8 2v4M3 10h18"></path></svg><span>Calendario</span></button>
          <button class="menu-item" type="button"><svg class="icon" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg><span>Equipo</span></button>
        </nav>
        <div id="mobileFilterContent"></div>
      </aside>
    </div>

    <main class="main-content">
      <header class="main-header">
        <div class="header-title">
          <button class="header-title-icon calendar-reset" type="button" aria-label="Limpiar filtros del calendario"><svg class="icon" style="width:28px;height:28px" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"></rect><path d="M16 2v4M8 2v4M3 10h18"></path></svg></button>
          <div>
            <h1><span class="desktop-title">La Lista Tierra Fertil</span><span class="mobile-title">La Lista Tierra Fertil</span></h1>
            <p>Programación de servicios y eventos</p>
          </div>
        </div>
        <div class="header-actions">
          <button class="header-button mobile-filter-button" id="openFilters" type="button"><svg class="icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg> Filtros</button>
          <button class="header-button" type="button">Hoy</button>
          <button class="header-button" type="button" aria-label="Mes anterior"><svg class="icon small" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"></path></svg></button>
          <button class="header-button" type="button" aria-label="Mes siguiente"><svg class="icon small" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"></path></svg></button>
          <button class="header-button month-selector" type="button">Junio 2026 <svg class="icon small chevron" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"></path></svg></button>
          <select class="week-selector" id="weekSelector" aria-label="Seleccionar semana">
            <option value="0">Semana 1</option>
            <option value="1">Semana 2</option>
            <option value="2">Semana 3</option>
            <option value="3">Semana 4</option>
            <option value="4">Semana 5</option>
          </select>
          <div class="view-toggle" aria-label="Selector de vista">
            <button class="active" type="button" data-view="month">Mes</button>
            <button type="button" data-view="week">Semana</button>
          </div>
        </div>
      </header>

      <section class="calendar-wrapper" id="calendarWrapper" aria-label="Calendario Junio 2026">
        <div class="calendar-grid" id="weekdayGrid"></div>
        <div class="calendar-grid" id="calendarGrid"></div>
        <div class="filter-status" id="filterStatus" aria-live="polite"></div>
        <div id="serviceDetailMount"></div>
      </section>
    </main>
  </div>

  <nav class="mobile-bottom-nav" aria-label="Navegación móvil">
    <button class="calendar-reset" type="button"><svg class="icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"></rect><path d="M16 2v4M8 2v4M3 10h18"></path></svg><span>Calendario</span></button>
    <button type="button"><svg class="icon" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg><span>Equipo</span></button>
  </nav>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
